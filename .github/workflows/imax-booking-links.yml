name: IMAX Booking Link Alert

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check for IMAX booking links
        run: |
          # Fetch page
          page=$(curl -s https://imaxmelbourne.com.au/session_times_and_tickets)

          # Extract ALL ticketing links (unique only)
          links=$(echo "$page" | grep -o 'https://ticketing.imaxmelbourne.com.au[^"]*' | sort -u)

          # Only proceed if links exist
          if [ -n "$links" ]; then

            # Check for your target movies
            if echo "$page" | grep -qiE "dune: part three|the odyssey"; then

              # Loop through each link and send individually
              echo "$links" | while read link; do

                curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
                  -d chat_id=${{ secrets.CHAT_ID }} \
                  -d text="🎟️ IMAX TICKETS LIVE → $link"

              done

            fi
          fi
