name: IMAX Real Session Alert (Strict)

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check for real IMAX sessions
        run: |
          # Fetch page
          page=$(curl -s https://imaxmelbourne.com.au/session_times_and_tickets)

          # Normalize
          lower=$(echo "$page" | tr '[:upper:]' '[:lower:]')

          # Split page into blocks (roughly by movie sections)
          echo "$lower" | awk '
            BEGIN { RS="</section>"; IGNORECASE=1 }
            /dune: part three|the odyssey/ {
              print
            }
          ' > movie_blocks.txt

          # Extract ONLY valid session links from those blocks
          links=$(grep -o 'https://ticketing.imaxmelbourne.com.au[^"]*visSelectTickets.aspx[^"]*txtsessionid=[0-9]*' movie_blocks.txt | sort -u)

          if [ -n "$links" ]; then

            echo "$links" | while read link; do
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
                -d chat_id=${{ secrets.CHAT_ID }} \
                -d text="🎬 IMAX SESSION LIVE → $link"
            done

          fi
