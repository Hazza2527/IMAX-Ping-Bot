name: IMAX Alert

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check IMAX tickets page
        run: |
          page=$(curl -s https://imaxmelbourne.com.au/session_times_and_tickets | tr '[:upper:]' '[:lower:]')

          # Extract only lines containing target movies
          matches=$(echo "$page" | grep -iE "dune: part three|the odyssey")

          # 🚨 70MM ALERT (must be in SAME line)
          if echo "$matches" | grep -q "70mm"; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
              -d chat_id=${{ secrets.CHAT_ID }} \
              -d text="🚨 IMAX 70MM TICKETS LIVE → https://imaxmelbourne.com.au/session_times_and_tickets"

          # 🎬 Movie detected only (no 70mm yet)
          elif [ -n "$matches" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
              -d chat_id=${{ secrets.CHAT_ID }} \
              -d text="🎬 IMAX: Movie detected → https://imaxmelbourne.com.au/session_times_and_tickets"
          fi
