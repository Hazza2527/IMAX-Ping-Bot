name: IMAX Real Session Alert

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check for real IMAX sessions
        run: |
          # Fetch page
          page=$(curl -s https://imaxmelbourne.com.au/session_times_and_tickets)

          # Normalize
          lower_page=$(echo "$page" | tr '[:upper:]' '[:lower:]')

          # Only continue if your movies exist
          if echo "$lower_page" | grep -qiE "dune: part three|the odyssey"; then

            # Extract ONLY real booking links (session-based)
            links=$(echo "$page" | grep -o 'https://ticketing.imaxmelbourne.com.au[^"]*visSelectTickets.aspx[^"]*txtSessionId=[0-9]*' | sort -u)

            if [ -n "$links" ]; then

              # Send each link separately
              echo "$links" | while read link; do

                curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
                  -d chat_id=${{ secrets.CHAT_ID }} \
                  -d text="🎬 IMAX SESSION LIVE → $link"

              done

            fi
          fi
