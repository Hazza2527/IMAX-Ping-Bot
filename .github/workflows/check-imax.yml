name: IMAX Alert

on:
  schedule:
    - cron: "* * * * *"  # every minute
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check IMAX page
        run: |
          page=$(curl -s https://imaxmelbourne.com.au/sessions | tr '[:upper:]' '[:lower:]')

          # MOVIE DETECTION
        if echo "$page" | grep -E "imax"; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
              -d chat_id=${{ secrets.CHAT_ID }} \
              -d text="🎬 MOVIE DETECTED at IMAX: https://imaxmelbourne.com.au/sessions"
          fi

          # TICKET DETECTION (stronger signal)
          if echo "$page" | grep -E "dune: part three|the odyssey" | grep -E "ticket|session|book"; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
              -d chat_id=${{ secrets.CHAT_ID }} \
              -d text="🚨 TICKETS LIKELY LIVE: https://imaxmelbourne.com.au/sessions"
          fi
