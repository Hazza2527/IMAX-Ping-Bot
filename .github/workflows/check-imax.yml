name: IMAX Real Session Alert (Hardened)

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check for real IMAX sessions
        run: |
          # Fetch page
          page=$(curl -s https://imaxmelbourne.com.au/session_times_and_tickets)

          # Normalize
          lower=$(echo "$page" | tr '[:upper:]' '[:lower:]')

          # Only continue if your movies are present
          if echo "$lower" | grep -qiE "dune: part three|the odyssey"; then

            # Extract STRICT session links only
            links=$(echo "$page" \
              | grep -o 'https://ticketing.imaxmelbourne.com.au[^"]*' \
              | grep 'visSelectTickets.aspx' \
              | grep 'txtSessionId=' \
              | grep -v 'visShop.aspx' \
              | sort -u)

            if [ -n "$links" ]; then

              echo "$links" | while read link; do
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
                  -d chat_id=${{ secrets.CHAT_ID }} \
                  -d text="🎬 IMAX SESSION LIVE → $link"
              done

            fi
          fi
